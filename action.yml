name: 'Crunchy Database Deployment'
description: 'Deploy a Crunchy PostgreSQL database to OpenShift'

inputs:
  # Required
  oc_namespace:
    description: 'OpenShift namespace'
    required: true
    validation: "^[a-z0-9]([-a-z0-9]*[a-z0-9])?$"
  oc_token:
    description: 'OpenShift token'
    required: true
    validation: "^[A-Za-z0-9-_]+$"

  # Typical / recommended
  environment:
    description: 'Environment name; omit for PRs'
    required: false
    validation: "^.+$"
  triggers:
    description: 'Paths used to trigger a deployment; e.g. (./backend/ ./frontend/).'
    required: false
    validation: "^(.+)$"
  oc_server:
    description: 'OpenShift server'
    default: 'https://api.silver.devops.gov.bc.ca:6443'
    required: false
    validation: "^https?://.+:6443$"
  values_file:
    description: 'Path to the values.yml file to use for the deployment (optional)'
    required: false
  pvc_size:
    description: 'Persistent Volume Claim storage size for PostgreSQL instances'
    required: false
  storage_class:
    description: 'Storage Class name for PostgreSQL instances'
    required: false
  postgres_version:
    description: 'PostgreSQL major version'
    required: false
  replicas:
    description: 'Number of PostgreSQL instance replicas'
    required: false
  cpu_request:
    description: 'CPU request for PostgreSQL instances'
    required: false
  memory_request:
    description: 'Memory request for PostgreSQL instances'
    required: false
  route_enabled:
    description: 'Enable an OpenShift TLS passthrough Route for external database access'
    default: 'false'
    required: false
  route_host:
    description: 'Custom host name for the Route (if omitted, OpenShift auto-generates it)'
    default: ''
    required: false
  s3_access_key:
    description: 'S3 access key'
    required: false
  s3_secret_key:
    description: 'S3 secret key'
    required: false
  s3_bucket:
    description: 'S3 bucket'
    required: false
  s3_endpoint:
    description: 'S3 endpoint'

  # Usually a bad idea / not recommended
  force_cleanup:
    description: 'Force cleanup of the database'
    default: false
    required: false
    type: boolean
  directory:
    description: 'Crunchy Chart directory'
    default: 'charts/crunchy'
    validation: "^.+$"
    required: false
  github_token:
    description: Specify token (GH or PAT), instead of inheriting one from the calling workflow
    default: ${{ github.token }}
  repository:
    description: 'GitHub repository; e.g. org/repo'
    default: bcgov/action-crunchy
    required: false
    validation: "^[a-zA-Z0-9_.-]+/[a-zA-Z0-9_.-]+$"
  ref:
    # This should be an empty string by default, but can be set to a specific branch/tag/sha
    description: 'Git ref to use; e.g. branch, tag, sha'
    default: 'main'
    required: false
  release_name:
    description: 'Release name; e.g. pg-qsos-crunchy, make sure it is unique in the namespace you are deploying to'
    default: ''
    required: false
  diff_branch:
    description: 'Branch to compare against for diff triggers; defaults to the default branch of the repository'
    required: false
    
outputs:
  release:
    description: 'Release name'
    value: ${{ steps.vars.outputs.RELEASE_NAME }}
  cluster:
    description: 'Cluster name'
    value: ${{ steps.vars.outputs.CLUSTER_NAME }}

runs:
  using: "composite"
  steps:
    - shell: bash
      id: vars
      run: |
        # Variables and Inputs

        # Release and cluster name; based on a hash of the repository name
        RELEASE_NAME=''
        if [ -n "${{ inputs.release_name }}" ]; then
          RELEASE_NAME="${{ inputs.release_name }}"
        else
          RELEASE_NAME=pg-$(echo -n "${{ github.event.repository.name }}" | md5sum | cut -c 1-8)
        fi
        CLUSTER_NAME=${RELEASE_NAME}-crunchy

        # Process vars and send to GITHUB_ENV (local vars) and GITHUB_OUTPUT (outputs)
        for var in RELEASE_NAME CLUSTER_NAME; do
          if [ -n "${!var}" ]; then
            echo "${var}=${!var}"
            echo "${var}=${!var}" >> $GITHUB_ENV
            echo "${var}=${!var}" >> $GITHUB_OUTPUT
          else
            echo "Warning: ${var} is not set."
            exit 1
          fi
        done

    - shell: bash
      if: github.event.action != 'closed'
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
      run: |
        # Variables and Inputs (!= closed)

        # Enable S3 backups if all required vars are set
        s3_vars=("${{ inputs.s3_access_key }}" "${{ inputs.s3_secret_key }}" "${{ inputs.s3_bucket }}" "${{ inputs.s3_endpoint }}")
        if [ "${#s3_vars[@]}" -eq 4 ]; then
          echo "All S3 configuration variables are present. Enabling S3 backups."
          S3_ENABLED=true
        elif [ "$s3_vars_count" -gt 0 ]; then
          echo "Warning: Some S3 configuration variables are set, but not all. Please ensure all S3 variables are configured."
          exit 1
        else
          echo "S3 configuration not set. Disabling S3 backups."
        fi

        # Save a copy of the caller's values.yml to /tmp so we can preserve it when checkout wipes the workspace
        VALUES_URL=""
        if [ -n "${{ inputs.values_file }}" ]; then
          # Check if it is a remote URL
          if [[ "${{ inputs.values_file }}" =~ ^https?:// ]]; then
            VALUES_URL="${{ inputs.values_file }}"
            
            # Build curl auth options if a token is provided (required for private repositories)
            CURL_AUTH_OPTS=()
            if [ -n "${GITHUB_TOKEN}" ]; then
              CURL_AUTH_OPTS=(-H "Authorization: token ${GITHUB_TOKEN}")
            fi
            CURL_AUTH_OPTS+=(-H "Accept: application/vnd.github.v3.raw")
            
            # Validate remote values.yml exists and is accessible
            if ! curl "${CURL_AUTH_OPTS[@]}" --head --location --output /dev/null --silent --fail "${VALUES_URL}"; then
              echo "Error: The remote values_file is invalid or inaccessible at: ${VALUES_URL}"
              exit 1
            fi
          else
            # Local file path
            if [ ! -f "${{ inputs.values_file }}" ]; then
              echo "Error: The specified values_file does not exist at the path: ${{ inputs.values_file }}"
              exit 1
            fi
            
            # Validate YAML integrity if yq is available
            if command -v yq >/dev/null 2>&1; then
              if ! yq eval . "${{ inputs.values_file }}" >/dev/null 2>&1; then
                echo "Error: The specified values_file is not a valid YAML file: ${{ inputs.values_file }}"
                exit 1
              fi
            fi
            
            cp "${{ inputs.values_file }}" /tmp/action-crunchy-values.yml
            VALUES_URL="file:///tmp/action-crunchy-values.yml"
          fi
        else
          echo "No custom values_file provided. Using action's default values.yml."
        fi

        # Process vars and send to GITHUB_ENV
        echo "S3_ENABLED=${S3_ENABLED}" >> $GITHUB_ENV
        echo "VALUES_URL=${VALUES_URL}" >> $GITHUB_ENV

    - id: triggers
      uses: bcgov/action-diff-triggers@a80e4b3cf77b7e05f84e74030e3bfa08b717a574 # v1.2.1
      with:
        triggers: ${{ inputs.triggers }}
        ref: ${{ inputs.diff_branch || github.event.repository.default_branch}}
    # Alway install don't consider triggers here.
    - uses: bcgov/action-oc-runner@b1c55b8a8bd5f42b19f72e6ea7df6d6a6eda44a1 # v1.5.1
      with:
        oc_namespace: "${{ inputs.oc_namespace }}"
        oc_token: "${{ inputs.oc_token }}"
        oc_server: "${{ inputs.oc_server }}"
        repository: ${{ github.repository }}                          # Always use the downstream
        ref: ${{ github.event.pull_request.base.ref || github.ref }}  # repository to run diffs!

    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        repository: ${{ inputs.repository }}
        ref: ${{ inputs.ref }}

    - if: github.event.action != 'closed'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
        PVC_SIZE: ${{ inputs.pvc_size }}
        STORAGE_CLASS: ${{ inputs.storage_class }}
        POSTGRES_VERSION: ${{ inputs.postgres_version }}
        REPLICAS: ${{ inputs.replicas }}
        CPU_REQUEST: ${{ inputs.cpu_request }}
        MEMORY_REQUEST: ${{ inputs.memory_request }}
        ROUTE_ENABLED: ${{ inputs.route_enabled }}
        ROUTE_HOST: ${{ inputs.route_host }}
      run: |
        # Deploy the database

        # Build arguments array to prevent positional parameter shifting
        ARGS=(
          "${{ inputs.directory }}"
          "${VALUES_URL}"
          "${{ github.event.repository.name }}"
          "${RELEASE_NAME}"
          "${{ steps.triggers.outputs.triggered}}"
        )
        if [ -n "${{ inputs.s3_access_key }}" ] && [ -n "${{ inputs.s3_secret_key }}" ] && [ -n "${{ inputs.s3_bucket }}" ] && [ -n "${{ inputs.s3_endpoint }}" ]; then
          ARGS+=(
            "${{ inputs.s3_access_key }}"
            "${{ inputs.s3_secret_key }}"
            "${{ inputs.s3_bucket }}"
            "${{ inputs.s3_endpoint }}"
          )
        fi

        # Execute the deploy command
        echo $GITHUB_ACTION_PATH/scripts/deploy_db.sh "${ARGS[@]}"
        $GITHUB_ACTION_PATH/scripts/deploy_db.sh "${ARGS[@]}"

    - if: github.event_name == 'pull_request' && github.event.action != 'closed'
      shell: bash
      run: |
        # Add user to Crunchy DB
        $GITHUB_ACTION_PATH/scripts/user_change.sh add "${{ github.event.number }}" "${CLUSTER_NAME}"

    - if: github.event.action == 'closed' || inputs.force_cleanup == 'true'
      shell: bash
      run: |
        # Remove PR specific user from Crunchy DB
        $GITHUB_ACTION_PATH/scripts/user_change.sh remove "${{ github.event.number }}" "${CLUSTER_NAME}"
